<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melfra Tech AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 2rem; max-width: 600px; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #009ee3, #6c63ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 2rem; }
        .badge { display: inline-block; border: 1px solid #333; border-radius: 8px; padding: 0.5rem 1rem; color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Melfra Tech AI</h1>
        <p>Lo digital, hecho bien. Al tiro. 🏛️</p>

</html>
